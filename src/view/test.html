<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Grid</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .book {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;

    }

    .book img {
      max-width: 100%;
      height: auto;
    }

    .book h3 {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="book">
      <img src="image/icon.png" alt="Book 1">
      <h3>Book Title 1</h3>
    </div>
    <div class="book">
      <img src="image/icon.png" alt="Book 2">
      <h3>Book Title 2</h3>
    </div>
    <div class="book">
      <img src="image/icon.png" alt="Book 3">
      <h3>Book Title 3</h3>
    </div>
  </div>
</body>
</html>
